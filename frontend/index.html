<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi SSH</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" rel="stylesheet">
    <link href="vendor/xterm.css" rel="stylesheet">
    <script src="vendor/xterm.min.js"></script>
    <script src="vendor/xterm-addon-fit.min.js"></script>
    <script src="vendor/xterm-addon-web-links.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header" style="--wails-draggable:drag">
                <span class="app-title">Multi SSH</span>
            </div>

            <div class="sidebar-search">
                <input type="text" id="searchInput" placeholder="Search…" autocomplete="off" spellcheck="false">
            </div>

            <nav id="connectionList" class="connection-list">
                <!-- Rendered by JS -->
            </nav>

            <div class="sidebar-footer">
                <button class="btn-add" id="btnAdd" title="New Connection">
                    <i class="ri-add-line"></i>
                </button>
                <span class="conn-count" id="connCount">0 connections</span>
            </div>
        </aside>

        <!-- Main Area -->
        <main id="mainContent">
            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="--wails-draggable:drag">
                <div class="empty-icon">
                    <i class="ri-terminal-box-line"></i>
                </div>
                <h2>No connections</h2>
                <p>Add a server to get started.</p>
                <button class="btn btn-primary" id="btnAddEmpty">
                    <i class="ri-add-line"></i> New Connection
                </button>
            </div>

            <!-- Detail + Terminal Split -->
            <div id="workspace" style="display:none">
                <!-- Top bar -->
                <div class="topbar" style="--wails-draggable:drag">
                    <div class="topbar-info">
                        <h1 id="detailName"></h1>
                        <span class="topbar-host" id="topbarHost"></span>
                    </div>
                    <div class="topbar-actions" style="--wails-draggable:no-drag">
                        <button class="btn-icon" id="btnConnect" title="Connect">
                            <i class="ri-play-fill"></i>
                        </button>
                        <button class="btn-icon" id="btnDisconnect" title="Disconnect" style="display:none">
                            <i class="ri-stop-fill"></i>
                        </button>
                        <button class="btn-icon" id="btnEdit" title="Edit">
                            <i class="ri-settings-3-line"></i>
                        </button>
                        <button class="btn-icon btn-icon-danger" id="btnDelete" title="Delete">
                            <i class="ri-delete-bin-6-line"></i>
                        </button>
                    </div>
                </div>

                <!-- Info cards -->
                <div class="info-row" id="infoRow">
                    <div class="info-pill">
                        <span class="info-label">Host</span>
                        <span class="info-value" id="detailHost"></span>
                    </div>
                    <div class="info-pill">
                        <span class="info-label">Port</span>
                        <span class="info-value" id="detailPort"></span>
                    </div>
                    <div class="info-pill">
                        <span class="info-label">User</span>
                        <span class="info-value" id="detailUser"></span>
                    </div>
                    <div class="info-pill" id="keyPill" style="display:none">
                        <span class="info-label">Key</span>
                        <span class="info-value" id="detailKey"></span>
                    </div>
                </div>

                <!-- Terminal -->
                <div class="terminal-container" id="terminalContainer">
                    <div class="terminal-placeholder" id="terminalPlaceholder">
                        <i class="ri-terminal-line"></i>
                        <span>Press <kbd>▶</kbd> to connect</span>
                    </div>
                    <div id="terminal"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal" style="display:none">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">New Connection</h2>
                <button class="btn-close" id="modalClose"><i class="ri-close-line"></i></button>
            </div>
            <form id="connectionForm" class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label for="formName">Name <span class="req">*</span></label>
                        <input type="text" id="formName" placeholder="Production API" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="formGroup">Group</label>
                        <input type="text" id="formGroup" placeholder="Production" autocomplete="off">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group f2">
                        <label for="formHost">Host <span class="req">*</span></label>
                        <input type="text" id="formHost" placeholder="192.168.1.100" required autocomplete="off">
                    </div>
                    <div class="form-group f1">
                        <label for="formPort">Port</label>
                        <input type="number" id="formPort" placeholder="22" value="22" autocomplete="off">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="formUser">User</label>
                        <input type="text" id="formUser" placeholder="root" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="formKey">Identity Key</label>
                        <input type="text" id="formKey" placeholder="~/.ssh/id_rsa" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label for="formPassword">Password <span class="hint warn"><i class="ri-error-warning-line"></i> insecure — stored in plain text</span></label>
                    <input type="password" id="formPassword" placeholder="Leave empty to use key or prompt" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="formDescription">Description</label>
                    <input type="text" id="formDescription" placeholder="Main web server" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="formTags">Tags <span class="hint">comma separated</span></label>
                    <input type="text" id="formTags" placeholder="web, nginx" autocomplete="off">
                </div>
            </form>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnCancel" type="button">Cancel</button>
                <button class="btn btn-primary" id="btnSave" type="button">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirm -->
    <div id="deleteModal" class="modal" style="display:none">
        <div class="modal-backdrop" id="deleteModalBackdrop"></div>
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h2>Delete Connection</h2>
            </div>
            <div class="modal-body">
                <p>Delete <strong id="deleteConnName"></strong>? This can't be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnDeleteCancel">Cancel</button>
                <button class="btn btn-danger" id="btnDeleteConfirm">Delete</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
